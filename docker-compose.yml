# NOX Mixnet Node -Docker Compose
# Docs: https://github.com/hisoka-io/run-nox
#
# Quick start:
#   1. docker pull ghcr.io/hisoka-io/nox:0.2.0-testnet
#   2. docker run --rm ghcr.io/hisoka-io/nox:0.2.0-testnet keygen > .env
#   3. cp configs/relay.toml config.toml   # or configs/exit.toml
#   4. docker compose up -d

services:
  price-server:
    image: ghcr.io/hisoka-io/nox:0.2.0-testnet
    container_name: nox-price-server
    entrypoint: ["price_server"]
    environment:
      - PRICE_SERVER_PORT=15004
      - PRICE_SERVER_BIND=0.0.0.0
      - RUST_LOG=info
    network_mode: host
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:15004/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  nox:
    image: ghcr.io/hisoka-io/nox:0.2.0-testnet
    container_name: nox-node
    network_mode: host
    volumes:
      - ./config.toml:/etc/nox/config.toml:ro
      - nox-identity:/var/lib/nox/identity
      - nox-data:/var/lib/nox/data
      - nox-logs:/var/lib/nox/logs
    env_file:
      - .env
    environment:
      - RUST_LOG=info
      - NOX_LOG_DIR=/var/lib/nox/logs
    depends_on:
      price-server:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:15001/topology"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  nox-identity:   # P2P identity key -persists across upgrades
  nox-data:       # Sled database -persists across upgrades
  nox-logs:       # Per-level log files (debug, info, warn, error)
